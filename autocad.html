<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AutoCAD</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
text-align:center;
}

header{
background:#111;
padding:20px;
border-bottom:2px solid #39ff14;
}

h1{
color:#39ff14;
margin:0;
}

.contenedor{
width:90%;
margin:auto;
margin-top:30px;
background:#111;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px #39ff14;
}

iframe{
width:100%;
height:600px;
border:none;
border-radius:10px;
margin-top:20px;
}

.boton{
display:inline-block;
margin-top:15px;
padding:12px 25px;
background:#39ff14;
color:black;
font-weight:bold;
text-decoration:none;
border-radius:8px;
}

.boton:hover{
background:#00ff88;
}
</style>

</head>

<body>

<header>
<h1>Planos AutoCAD</h1>
</header>

<div class="contenedor">

<iframe src="https://docs.google.com/gview?url=https://damassets.autodesk.net/content/dam/autodesk/www/solutions/building-design/autocad-floor-plan-sample.pdf&embedded=true"></iframe>

<a class="boton" href="https://damassets.autodesk.net/content/dam/autodesk/www/solutions/building-design/autocad-floor-plan-sample.pdf" target="_blank">
Abrir plano AutoCAD
</a>

</div>

</body>
</html>
